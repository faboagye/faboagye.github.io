
project:
  type: website
  output-dir: docs
  render:
    - "*.qmd"

description-meta: "Website for Fuseini Aboagye"
author-meta: "Fuseini Aboagye"

website:
  title: "Homepage of Fuseini Aboagye"
  image: "files/images/Fprofile.png"
  description: "Teaching Assistant | Economics & Statistics Graduate | Aspiring Statistician"
  site-url: "https://faboagye.github.io"
  repo-url: "https://github.com/faboagye/faboagye.github.io"

  open-graph: true
  twitter-card: true

  navbar:
    # logo: "files/images/UG-Logo.png"
    # logo-alt: "University of Ghana"

    background: "#30363D"
    foreground: "#D0D0D0"

    pinned: true
    collapse: true
    collapse-below: lg
    search: false

    left:
      - text: RESEARCH
        href: publications.qmd

      - text: BLOG
        href: blog.qmd
        
      - text: CONTACT
        href: contact.qmd

      - text: TEACHING
        href: teaching.qmd

      - text: PRESENTATIONS
        href: posts.qmd

      - text: AWARDS & HONORS
        href: Awards.qmd

      - text: NEWS
        href: mediatab.qmd

    right:
      - text: CV
        href: files/Fuseini_Aboagye_CV.pdf

      - icon: github
        href: https://github.com/faboagye
        target: _blank

  page-navigation: true

  reader-mode: true

  draft-mode: unlinked

  search:
    location: navbar
    type: textbox

  page-footer:
    left: "[Fuseini Aboagye](https://github.com/faboagye) &copy; <script>document.write(new Date().getFullYear())</script>"

    center: "Built with Quarto"

    right:
      - icon: github
        href: https://github.com/faboagye
        target: _blank

  google-analytics:
    tracking-id: ""
    anonymize-ip: true

bibliography: references.bib

format:
  html:

    theme:
      light: cosmo
      dark: darkly

    theme-toggle: true

    respect-user-color-scheme: false

    css: styles.css

    toc: true

    page-layout: full

    smooth-scroll: true

    anchor-sections: true

    footnotes-hover: true

    code-copy: true

    code-link: true

    code-overflow: wrap

    fig-align: center

    link-external-icon: false

    link-external-newwindow: true

    email-obfuscation: javascript

    grid:
      sidebar-width: 250px
      body-width: 900px
      margin-width: 250px

    include-in-header:
      - "files/includes/_academic.qmd"
      - "Views.html"
